spring.application.name=investshop
#H2
spring.datasource.url=jdbc:h2:mem:investshop
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=ex
spring.datasource.password=

#JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

#Cart file
app.cart.file-path=C:/Users/elhas/Desktop/cart.json

# permet à Spring de charger le data.sql au démarrage
spring.jpa.defer-datasource-initialization=true
